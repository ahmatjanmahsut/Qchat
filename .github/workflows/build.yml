name: Build Qchat App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew :android:app:assembleDebug --no-daemon --stacktrace

      - name: Build Android Release APK
        run: ./gradlew :android:app:assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qchat-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: qchat-android-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

  build-backend:
    name: Build Backend Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Backend
        run: ./gradlew :backend:build --no-daemon --stacktrace

      - name: Build Backend Shadow JAR
        run: ./gradlew :backend:shadowJar --no-daemon

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: qchat-backend
          path: backend/build/libs/*-all.jar
