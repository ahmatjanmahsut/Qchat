name: Build Qchat App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle
      
      - name: Build Android App
        run: |
          cd android
          ./gradlew build --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: qchat-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
  
  build-backend:
    name: Build Backend Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle
      
      - name: Build Backend
        run: |
          cd backend
          ./gradlew build --no-daemon
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v3
        with:
          name: qchat-backend
          path: backend/build/libs/*.jar
  
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [build-android, build-backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle
      
      - name: Run Android Tests
        run: |
          cd android
          ./gradlew test --no-daemon
      
      - name: Run Backend Tests
        run: |
          cd backend
          ./gradlew test --no-daemon
