name: Build Qchat App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew :android:app:assembleDebug --stacktrace --info

      - name: List Android APK files
        run: find android/app/build/outputs -name "*.apk" || echo "No APK files found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qchat-android-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: |
            android/app/build/outputs/logs
            android/app/build/reports

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Backend JAR
        run: ./gradlew :backend:jar --stacktrace

      - name: List Backend JAR files
        run: find backend/build/libs -name "*.jar" || echo "No JAR files found"

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: qchat-backend
          path: backend/build/libs/*.jar
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-log
          path: backend/build/reports
