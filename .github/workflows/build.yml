name: Build Qchat App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build All
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Build Android Debug APK
        run: gradle :android:app:assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Build Backend
        run: gradle :backend:build --stacktrace 2>&1 | tee -a build.log

      - name: Build Backend Shadow JAR
        run: gradle :backend:shadowJar

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: qchat-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: qchat-backend
          path: backend/build/libs/*-all.jar

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
