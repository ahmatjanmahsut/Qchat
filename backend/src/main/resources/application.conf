# Qchat Backend Application Configuration

# Server Configuration
server {
    host = "0.0.0.0"
    port = 8080
    engine = "netty"
}

# Database Configuration
# Use environment variables for sensitive data
database {
    url = ${?DB_URL:"jdbc:postgresql://localhost:5432/qchat"}
    username = ${?DB_USERNAME:"postgres"}
    password = ${?DB_PASSWORD:"password"}
    driver = "org.postgresql.Driver"
    maxPoolSize = 20
    minIdle = 5
    connectionTimeout = 30000
    idleTimeout = 600000
}

# JWT Configuration
# Use environment variables for sensitive data
jwt {
    secret = ${?JWT_SECRET:"change-me-in-production-use-environment-variable"}
    issuer = "qchat"
    expiration = 86400000  # 24 hours in milliseconds
    refreshExpiration = 604800000  # 7 days in milliseconds
}

# WebSocket Configuration
websocket {
    ping-interval = 30  # seconds
    timeout = 30       # seconds
    maxFrameSize = 65536
}

# CORS Configuration
# Restrict to specific origins in production
cors {
    allowed-origins = ${?CORS_ALLOWED_ORIGINS:["http://localhost:3000", "http://localhost:8080"]}
    allowed-methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allowed-headers = ["Content-Type", "Authorization", "X-Requested-With"]
    allowCredentials = true
    maxAge = 3600
}

# Application Configuration
app {
    name = "Qchat Backend"
    version = "1.0.0"
    environment = "development"
}
